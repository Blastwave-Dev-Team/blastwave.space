services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wikijs
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wikijs -d wikijs']
      interval: 10s
      timeout: 5s
      retries: 5

  wikijs:
    image: ghcr.io/requarks/wiki:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: ${DB_PASSWORD}
      DB_NAME: wikijs
    ports:
      - '127.0.0.1:${WIKIJS_PORT:-3000}:3000'

  book-proxy:
    build:
      context: ../book-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - wikijs
    environment:
      WIKIJS_GRAPHQL_URL: ${WIKIJS_GRAPHQL_URL:-http://wikijs:3000/graphql}
      WIKIJS_API_KEY: ${WIKIJS_API_KEY}
      WIKIJS_LOCALE: ${WIKIJS_LOCALE:-en}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      ASSET_CACHE_TTL_SECONDS: ${ASSET_CACHE_TTL_SECONDS:-86400}
      HOST: ${BOOK_PROXY_HOST:-0.0.0.0}
      PORT: 3001
    ports:
      - '127.0.0.1:${BOOK_PROXY_PORT:-3001}:3001'

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: ${API_HOST:-0.0.0.0}
      PORT: 3002
    ports:
      - '127.0.0.1:${API_PORT:-3002}:3002'

volumes:
  pgdata:
