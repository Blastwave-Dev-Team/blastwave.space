# Static site (build dist/ to /var/www/blastwave)
server {
    server_name blastwave.space www.blastwave.space;

    root /var/www/blastwave;
    index index.html;

    location /wiki-theme/ {
        alias /var/www/blastwave/wiki-theme/;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blastwave.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blastwave.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Wiki.js authoring UI
server {
    server_name wiki.blastwave.space;

    location = /_theme/login.css {
        alias /var/www/blastwave/wiki-theme/login.css;
        add_header Cache-Control "public, max-age=300";
    }

    location = /_theme/inject.css {
        alias /var/www/blastwave/wiki-theme/inject.css;
        add_header Cache-Control "public, max-age=300";
    }

    # Wiki.js does not inject theme CSS on auth pages.
    location ~ ^/(login(?:/|$)|login-reset|register(?:/|$)) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter '</body>' '<link rel="stylesheet" href="https://wiki.blastwave.space/_theme/login.css"></body>';
    }

    # Wiki.js views that skip injectCSS (tags, admin, profile — body-only pug templates).
    location ~ ^/(t|a|p)(?:/|$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter '</body>' '<link rel="stylesheet" href="https://wiki.blastwave.space/_theme/inject.css"></body>';
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blastwave.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blastwave.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# In-game book content proxy
server {
    server_name book.blastwave.space;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blastwave.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blastwave.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.blastwave.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = blastwave.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name blastwave.space www.blastwave.space;
    return 404; # managed by Certbot
}

server {
    if ($host = wiki.blastwave.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name wiki.blastwave.space;
    return 404; # managed by Certbot
}

server {
    if ($host = book.blastwave.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name book.blastwave.space;
    return 404; # managed by Certbot
}
